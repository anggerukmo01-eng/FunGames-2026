<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no">
<title>Literasi & Numerasi Ceria — Kelas 1 SD</title>
<meta name="description" content="Belajar membaca, menulis, dan berhitung dengan menyenangkan untuk siswa kelas 1 SD">
<style>
/* ======================================================================
   DESIGN TOKENS
   Palette: sunbeam yellow bg, owl-purple primary, petal-pink accent,
   pond-teal secondary, leaf-green success, ink-plum text.
   Signature element: "Kaka the Owl" mascot that reacts to everything,
   sitting inside a torn-paper speech-bubble card, plus a floating
   "sticker shelf" of soft blob shapes behind every section header.
   ====================================================================== */
:root{
  --bg:#FFF6E4;
  --bg-2:#FFEFD1;
  --card:#FFFFFF;
  --ink:#2B2250;
  --ink-soft:#5B5480;
  --purple:#7C5CFC;
  --purple-dark:#5A3EE0;
  --pink:#FF6FA5;
  --teal:#12B6A8;
  --yellow:#FFC93C;
  --green:#3FC97A;
  --red:#FF5C6C;
  --blue:#4EA8FF;
  --radius:26px;
  --radius-sm:16px;
  --shadow:0 10px 0 rgba(43,34,80,.10), 0 18px 34px rgba(43,34,80,.14);
  --shadow-sm:0 6px 0 rgba(43,34,80,.10), 0 10px 18px rgba(43,34,80,.12);
  --font-scale:1;
  --display-font: "Segoe UI Rounded","SF Pro Rounded",Verdana,"Trebuchet MS",sans-serif;
  --body-font: "Trebuchet MS","Segoe UI",Verdana,sans-serif;
}
[data-theme="dark"]{
  --bg:#221C3D;
  --bg-2:#2B2354;
  --card:#312a58;
  --ink:#F4F1FF;
  --ink-soft:#C8C0F5;
  --shadow:0 10px 0 rgba(0,0,0,.25), 0 18px 34px rgba(0,0,0,.35);
  --shadow-sm:0 6px 0 rgba(0,0,0,.25), 0 10px 18px rgba(0,0,0,.3);
}
[data-dyslexia="1"]{
  --display-font: "Comic Sans MS","Trebuchet MS",Verdana,sans-serif;
  --body-font: "Comic Sans MS","Trebuchet MS",Verdana,sans-serif;
}
*{box-sizing:border-box;}
html{-webkit-tap-highlight-color:transparent;}
body{
  margin:0;
  background:
    radial-gradient(circle at 8% 12%, var(--bg-2) 0%, transparent 40%),
    radial-gradient(circle at 92% 85%, var(--bg-2) 0%, transparent 45%),
    var(--bg);
  color:var(--ink);
  font-family:var(--body-font);
  font-size:calc(16px * var(--font-scale));
  min-height:100vh;
  overflow-x:hidden;
}
h1,h2,h3,h4{font-family:var(--display-font); margin:0 0 .3em; letter-spacing:.2px;}
button{font-family:inherit; cursor:pointer;}
::selection{background:var(--yellow); color:var(--ink);}

/* Sticker-shelf decorative blobs */
.blob-field{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;}
.blob{position:absolute; border-radius:50%; filter:blur(0px); opacity:.35;}
.blob.b1{width:220px;height:220px;background:var(--pink);top:-60px;left:-60px;}
.blob.b2{width:160px;height:160px;background:var(--teal);bottom:10%;right:-40px;}
.blob.b3{width:120px;height:120px;background:var(--yellow);top:40%;left:-40px;}
.blob.b4{width:180px;height:180px;background:var(--purple);bottom:-70px;left:40%;opacity:.2;}

#app{position:relative; z-index:1; display:flex; min-height:100vh;}

/* ---------------- Sidebar / nav ---------------- */
#sidebar{
  width:250px; flex:none; background:var(--card); box-shadow:var(--shadow);
  border-radius:0 var(--radius) var(--radius) 0; padding:18px 14px; position:sticky; top:0; height:100vh;
  overflow-y:auto; z-index:20; transition:transform .25s ease;
}
.brand{display:flex; align-items:center; gap:10px; padding:6px 8px 16px;}
.brand .owl-mini{width:44px;height:44px;flex:none;}
.brand h1{font-size:1.05rem; line-height:1.15; color:var(--purple-dark);}
.brand small{color:var(--ink-soft); font-weight:600;}

.navgroup{margin-bottom:10px;}
.navgroup > .nav-title{
  font-size:.72rem; text-transform:uppercase; letter-spacing:1px; font-weight:800;
  color:var(--ink-soft); padding:10px 10px 4px;
}
.navbtn{
  width:100%; display:flex; align-items:center; gap:10px; text-align:left;
  border:none; background:transparent; color:var(--ink); padding:10px 10px;
  border-radius:14px; font-weight:700; font-size:.92rem; margin-bottom:2px;
}
.navbtn:hover{background:var(--bg-2);}
.navbtn.active{background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:#fff; box-shadow:var(--shadow-sm);}
.navbtn .emo{font-size:1.2rem;}

#sidebar-toggle{display:none;}

/* ---------------- Top bar (stats) ---------------- */
#topbar{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:14px 20px; position:sticky; top:0; z-index:15;
  background:linear-gradient(180deg, var(--bg) 70%, transparent);
}
.stat-pill{
  display:flex; align-items:center; gap:8px; background:var(--card); box-shadow:var(--shadow-sm);
  border-radius:999px; padding:8px 16px; font-weight:800; font-size:.95rem;
}
.stat-pill .emo{font-size:1.15rem;}
#hamburger{display:none; background:var(--card); border:none; border-radius:12px; padding:10px 12px; box-shadow:var(--shadow-sm); font-size:1.2rem;}

/* ---------------- Main viewport ---------------- */
#main{flex:1; min-width:0; padding:0 22px 140px;}
.view{display:none; animation:fadeUp .35s ease;}
.view.active{display:block;}
@keyframes fadeUp{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);}}

.section-head{margin:6px 0 18px; position:relative;}
.section-head h2{font-size:1.6rem; color:var(--purple-dark);}
.section-head p{color:var(--ink-soft); font-weight:600; margin:0;}
.eyebrow{
  display:inline-block; background:var(--yellow); color:#5b4300; font-weight:800; font-size:.72rem;
  padding:4px 12px; border-radius:999px; margin-bottom:8px; letter-spacing:.5px;
}

/* ---------------- Cards / grid ---------------- */
.grid{display:grid; gap:14px;}
.grid.cols-2{grid-template-columns:repeat(2,1fr);}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-4{grid-template-columns:repeat(4,1fr);}
.grid.cols-5{grid-template-columns:repeat(5,1fr);}
.grid.cols-6{grid-template-columns:repeat(6,1fr);}
.grid.cols-10{grid-template-columns:repeat(10,1fr);}

.card{
  background:var(--card); border-radius:var(--radius-sm); box-shadow:var(--shadow-sm);
  padding:16px; transition:transform .15s ease, box-shadow .15s ease;
}
.card.hoverable:hover{transform:translateY(-4px);}
.menu-card{
  border:none; text-align:left; display:flex; flex-direction:column; gap:6px; cursor:pointer;
  background:var(--card); border-radius:22px; box-shadow:var(--shadow-sm); padding:18px;
  position:relative; overflow:hidden;
}
.menu-card:hover{transform:translateY(-5px) rotate(-.3deg);}
.menu-card .ico{font-size:2.1rem;}
.menu-card h3{font-size:1.05rem; margin:2px 0 2px; color:var(--purple-dark);}
.menu-card p{margin:0; color:var(--ink-soft); font-size:.85rem; font-weight:600;}
.menu-card .tag{
  position:absolute; top:12px; right:12px; background:var(--bg-2); color:var(--ink-soft);
  font-size:.68rem; font-weight:800; padding:3px 9px; border-radius:999px;
}

/* Letter / item tile */
.tile{
  background:var(--card); border-radius:18px; box-shadow:var(--shadow-sm); border:none;
  padding:14px 8px; display:flex; flex-direction:column; align-items:center; gap:4px; font-weight:800;
  color:var(--ink); position:relative;
}
.tile:hover{transform:translateY(-3px);}
.tile .big{font-size:1.8rem; font-family:var(--display-font);}
.tile .emo{font-size:1.6rem;}
.tile.mastered::after{
  content:"⭐"; position:absolute; top:4px; right:6px; font-size:.9rem;
}
.tile.correct{outline:3px solid var(--green);}
.tile.wrong{outline:3px solid var(--red);}

/* Buttons */
.btn{
  border:none; border-radius:16px; padding:12px 20px; font-weight:800; font-size:.95rem;
  box-shadow:var(--shadow-sm); background:var(--card); color:var(--ink);
  display:inline-flex; align-items:center; gap:8px;
}
.btn:active{transform:translateY(2px); box-shadow:0 2px 0 rgba(43,34,80,.12);}
.btn.primary{background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:#fff;}
.btn.pink{background:linear-gradient(135deg,var(--pink),#ff4f8f); color:#fff;}
.btn.teal{background:linear-gradient(135deg,var(--teal),#0d8f85); color:#fff;}
.btn.yellow{background:linear-gradient(135deg,#ffd25c,var(--yellow)); color:#5b4300;}
.btn.green{background:linear-gradient(135deg,#57dd8f,var(--green)); color:#08331a;}
.btn.ghost{background:transparent; box-shadow:none; border:2px solid var(--bg-2);}
.btn.big{padding:16px 26px; font-size:1.1rem; border-radius:20px;}
.btn.block{width:100%; justify-content:center;}
.btn:disabled{opacity:.45; pointer-events:none;}
.btn-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:12px;}

.chip{display:inline-block; padding:5px 12px; border-radius:999px; background:var(--bg-2); font-weight:700; font-size:.78rem; color:var(--ink-soft); margin:2px 4px 2px 0;}
.chip.active{background:var(--purple); color:#fff;}

/* Progress bar */
.progress{height:14px; background:var(--bg-2); border-radius:999px; overflow:hidden; box-shadow:inset 0 2px 4px rgba(0,0,0,.08);}
.progress > span{display:block; height:100%; background:linear-gradient(90deg,var(--teal),var(--green)); border-radius:999px; transition:width .4s ease;}

/* Detail panel (letter/word/sentence detail) */
.detail{
  display:flex; gap:24px; align-items:center; background:var(--card); border-radius:var(--radius);
  box-shadow:var(--shadow); padding:26px; flex-wrap:wrap;
}
.detail .glyph{
  width:150px; height:150px; border-radius:28px; display:flex; align-items:center; justify-content:center;
  font-size:4.6rem; font-family:var(--display-font); font-weight:800; color:#fff;
  background:linear-gradient(135deg,var(--purple),var(--pink)); box-shadow:var(--shadow-sm); flex:none;
}
.detail .info{flex:1; min-width:220px;}
.detail .info h2{font-size:2.2rem; color:var(--purple-dark);}
.detail .emo-big{font-size:3.5rem;}

/* Canvas tracing */
.trace-wrap{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; text-align:center;}
canvas.trace-canvas{
  background:repeating-linear-gradient(0deg, #fff, #fff 30px, #f0ecff 30px, #f0ecff 32px);
  border-radius:18px; box-shadow:var(--shadow-sm); touch-action:none; max-width:100%;
  border:3px dashed var(--purple);
}
.score-ring{font-size:2.4rem; font-weight:900; color:var(--purple-dark);}

/* Mascot */
#mascot-wrap{
  position:fixed; bottom:16px; right:16px; z-index:60; display:flex; align-items:flex-end; gap:10px;
  max-width:min(80vw,340px);
}
#mascot-bubble{
  background:var(--card); border-radius:20px 20px 4px 20px; box-shadow:var(--shadow);
  padding:12px 16px; font-weight:700; font-size:.92rem; color:var(--ink); max-width:250px;
  animation:pop .25s ease;
}
@keyframes pop{from{transform:scale(.8); opacity:0;} to{transform:scale(1); opacity:1;}}
#mascot-svg{width:78px; height:78px; flex:none; cursor:pointer; filter:drop-shadow(0 8px 8px rgba(0,0,0,.18));}
.mascot-bob{animation:bob 2.6s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0) rotate(0deg);} 50%{transform:translateY(-8px) rotate(-3deg);}}

/* Confetti canvas */
#confetti-canvas{position:fixed; inset:0; pointer-events:none; z-index:80;}

/* Toast */
#toast{
  position:fixed; top:18px; left:50%; transform:translateX(-50%) translateY(-120%); z-index:90;
  background:var(--ink); color:#fff; padding:12px 22px; border-radius:999px; font-weight:800;
  box-shadow:var(--shadow); transition:transform .35s ease; font-size:.95rem;
}
#toast.show{transform:translateX(-50%) translateY(0);}

/* Footer */
footer{
  margin-top:40px; padding:22px; text-align:center; color:var(--ink-soft); font-weight:600; font-size:.82rem;
  border-top:2px dashed var(--bg-2);
}

/* Badges page */
.badge-card{display:flex; flex-direction:column; align-items:center; text-align:center; gap:6px; padding:18px;}
.badge-card .ico{font-size:2.6rem;}
.badge-card.locked{opacity:.35; filter:grayscale(1);}

/* Settings */
.setting-row{display:flex; align-items:center; justify-content:space-between; gap:14px; padding:14px 0; border-bottom:1px solid var(--bg-2);}
.setting-row:last-child{border-bottom:none;}
.setting-row .label{font-weight:800;}
.setting-row .sub{font-weight:600; color:var(--ink-soft); font-size:.8rem;}
input[type="range"]{width:150px;}
.switch{position:relative; width:52px; height:30px; background:var(--bg-2); border-radius:999px; border:none; flex:none;}
.switch::after{content:""; position:absolute; top:3px; left:3px; width:24px; height:24px; background:#fff; border-radius:50%; box-shadow:0 2px 4px rgba(0,0,0,.25); transition:transform .2s ease;}
.switch.on{background:var(--green);}
.switch.on::after{transform:translateX(22px);}

/* Quiz layout */
.quiz-box{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:28px; text-align:center;}
.quiz-prompt{font-size:2.6rem; font-family:var(--display-font); font-weight:900; color:var(--purple-dark); margin:10px 0 22px;}
.quiz-choices{display:grid; grid-template-columns:repeat(2,1fr); gap:14px; max-width:520px; margin:0 auto;}
.quiz-choices .choice{font-size:1.4rem; padding:20px;}

/* Game canvas */
.game-canvas-wrap{background:linear-gradient(180deg,#dff3ff,#fff); border-radius:var(--radius); box-shadow:var(--shadow); padding:14px; text-align:center;}
canvas.game-canvas{background:#eaf6ff; border-radius:18px; max-width:100%;}

/* Wheel */
.wheel-wrap{display:flex; flex-direction:column; align-items:center; gap:16px;}
#wheel-svg{transition:transform 3.5s cubic-bezier(.17,.67,.16,1);}

/* Print (rapor) */
@media print{
  #sidebar, #topbar, #mascot-wrap, footer, .no-print{display:none !important;}
  #main{padding:0;}
  body{background:#fff;}
}

/* Responsive */
@media (max-width:900px){
  #sidebar{position:fixed; left:0; top:0; transform:translateX(-105%); border-radius:0 24px 24px 0;}
  #sidebar.open{transform:translateX(0);}
  #hamburger{display:inline-flex;}
  .grid.cols-6{grid-template-columns:repeat(4,1fr);}
  .grid.cols-5{grid-template-columns:repeat(3,1fr);}
  .grid.cols-4{grid-template-columns:repeat(2,1fr);}
  .grid.cols-3{grid-template-columns:repeat(2,1fr);}
  .grid.cols-10{grid-template-columns:repeat(5,1fr);}
  .detail{flex-direction:column; text-align:center;}
  #main{padding:0 12px 130px;}
}
</style>
</head>

/* =========================================================================
   2. STATE
   ========================================================================= */
const STORE_KEY='lnc_state_v1';
function defaultState(){
  return {
    points:0, streak:0, lastActiveDate:null,
    lettersMastered:[], syllablesMastered:[], wordsMastered:[], sentencesRead:[], numbersMastered:[],
    badges:[], traceCount:0, mathCorrect:0, quizStreakBest:0, quizStreakNow:0,
    history:[], // {date:'YYYY-MM-DD', points:n}
    settings:{theme:'light', fontSize:1, dyslexia:false, sfx:true, sfxVol:0.7, musicVol:0.4}
  };
}
let STATE = loadState();

function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed, {settings:Object.assign(defaultState().settings, parsed.settings||{})});
  }catch(e){ return defaultState(); }
}
function saveState(){ localStorage.setItem(STORE_KEY, JSON.stringify(STATE)); }

function todayStr(){ return new Date().toISOString().slice(0,10); }
function todayPoints(s){
  const t = todayStr();
  const h = s.history.find(x=>x.date===t);
  return h?h.points:0;
}
function touchStreak(){
  const t = todayStr();
  if(STATE.lastActiveDate === t) return;
  const y = new Date(Date.now()-86400000).toISOString().slice(0,10);
  STATE.streak = (STATE.lastActiveDate===y) ? STATE.streak+1 : 1;
  STATE.lastActiveDate = t;
  saveState();
}
function addPointsToHistory(n){
  const t = todayStr();
  let h = STATE.history.find(x=>x.date===t);
  if(!h){ h={date:t, points:0}; STATE.history.push(h); if(STATE.history.length>30) STATE.history.shift(); }
  h.points += n;
}
function currentLevel(){
  let cur = LEVELS[0];
  for(const lv of LEVELS){ if(STATE.points>=lv.min) cur=lv; }
  return cur;
}
function awardPoints(n, msg){
  STATE.points += n;
  addPointsToHistory(n);
  touchStreak();
  checkBadges();
  saveState();
  renderTopbar();
  if(msg) mascotSay(msg);
}
function checkBadges(){
  BADGE_DEFS.forEach(b=>{
    if(!STATE.badges.includes(b.id) && b.check(STATE)){
      STATE.badges.push(b.id);
      toast('🏅 Lencana baru: '+b.name+' '+b.emo);
      launchConfetti();
    }
  });
}
function markMastered(list, item){
  if(!STATE[list].includes(item)){ STATE[list].push(item); }
  saveState();
}

/* =========================================================================
   3. AUDIO — speech synthesis + WebAudio SFX
   ========================================================================= */
let audioCtx=null;
function ensureAudio(){ if(!audioCtx){ try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return audioCtx; }

function speak(text, rate){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='id-ID'; u.rate = rate||0.92; u.pitch=1.05;
  window.speechSynthesis.speak(u);
}
function playTone(freq, dur, type, delay, vol){
  if(!STATE.settings.sfx) return;
  const ctx=ensureAudio(); if(!ctx) return;
  const t0 = ctx.currentTime + (delay||0);
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type||'sine';
  osc.frequency.setValueAtTime(freq, t0);
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime((vol!==undefined?vol:0.25)*STATE.settings.sfxVol, t0+0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  osc.connect(gain).connect(ctx.destination);
  osc.start(t0); osc.stop(t0+dur+0.02);
}
function sfxCorrect(){ playTone(523,.14,'sine',0); playTone(659,.14,'sine',.12); playTone(784,.22,'sine',.24); }
function sfxWrong(){ playTone(180,.28,'sawtooth',0,.18); }
function sfxHebat(){ [523,587,659,784,988].forEach((f,i)=>playTone(f,.18,'triangle',i*.09)); }
function sfxClick(){ playTone(700,.05,'square',0,.08); }

const confettiCanvas = document.getElementById('confetti-canvas');
const cctx = confettiCanvas.getContext('2d');
let confettiParticles=[];
function resizeConfetti(){ confettiCanvas.width=innerWidth; confettiCanvas.height=innerHeight; }
resizeConfetti(); addEventListener('resize', resizeConfetti);
function launchConfetti(){
  const colors=['#7C5CFC','#FF6FA5','#12B6A8','#FFC93C','#3FC97A','#4EA8FF'];
  for(let i=0;i<90;i++){
    confettiParticles.push({
      x:innerWidth/2 + (Math.random()-.5)*innerWidth*0.6,
      y:-20-Math.random()*100,
      vx:(Math.random()-.5)*4, vy:2+Math.random()*4,
      size:5+Math.random()*7, color:colors[i%colors.length],
      rot:Math.random()*360, vrot:(Math.random()-.5)*10, life:0
    });
  }
  if(!confettiRunning) runConfetti();
}
let confettiRunning=false;
function runConfetti(){
  confettiRunning=true;
  cctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
  confettiParticles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.05; p.rot+=p.vrot; p.life++;
    cctx.save(); cctx.translate(p.x,p.y); cctx.rotate(p.rot*Math.PI/180);
    cctx.fillStyle=p.color; cctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
    cctx.restore();
  });
  confettiParticles = confettiParticles.filter(p=>p.y<confettiCanvas.height+40 && p.life<400);
  if(confettiParticles.length>0){ requestAnimationFrame(runConfetti); }
  else { confettiRunning=false; cctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height); }
}

function renderTraceView(box, opts){
  // opts: {title, eyebrow, items:[strings], onDone(score,text)}
  box.innerHTML = sectionHead(opts.eyebrow,opts.title,'Ikuti garis putus-putus dengan jari atau mouse, lalu tekan Cek Tulisan.') +
    `<div class="chip-row" id="trace-picker" style="margin-bottom:14px;"></div>
     <div class="trace-wrap">
       <canvas id="trace-canvas" class="trace-canvas" width="640" height="320"></canvas>
       <div class="btn-row" style="justify-content:center;">
         <button class="btn ghost" id="trace-clear">🧹 Hapus</button>
         <button class="btn teal" id="trace-speak">🔊 Dengarkan</button>
         <button class="btn primary big" id="trace-check">✅ Cek Tulisan</button>
       </div>
       <div id="trace-result" style="margin-top:16px;"></div>
     </div>`;
  const picker=box.querySelector('#trace-picker');
  picker.innerHTML = opts.items.map((t,i)=>`<button class="chip ${i===0?'active':''}" data-i="${i}">${t}</button>`).join('');
  let currentText = opts.items[0];
  const canvas=box.querySelector('#trace-canvas');
  const ctx=canvas.getContext('2d');
  let mask=null, drawnPixels=null, drawing=false, lastPt=null, drawnCount=0;

  function setup(text){
    currentText=text;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // dotted guide
    ctx.save();
    ctx.font = (text.length>6? '64px' : '150px') + ' "Segoe UI Rounded", Verdana, sans-serif';
    ctx.textBaseline='middle'; ctx.textAlign='center';
    ctx.strokeStyle='#c9bdfc'; ctx.lineWidth=2; ctx.setLineDash([6,7]);
    ctx.strokeText(text, canvas.width/2, canvas.height/2);
    ctx.restore();
    // build mask off-screen
    const off=document.createElement('canvas'); off.width=canvas.width; off.height=canvas.height;
    const octx=off.getContext('2d');
    octx.font = ctx.font; octx.textBaseline='middle'; octx.textAlign='center'; octx.fillStyle='#000';
    octx.fillText(text, canvas.width/2, canvas.height/2);
    mask = octx.getImageData(0,0,off.width,off.height).data;
    drawnPixels = new Uint8Array(canvas.width*canvas.height);
    drawnCount=0;
    box.querySelector('#trace-result').innerHTML='';
  }
  setup(currentText);
  picker.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
    picker.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
    c.classList.add('active'); setup(opts.items[c.dataset.i]);
  }));
  box.querySelector('#trace-speak').addEventListener('click',()=>speak(currentText));
  box.querySelector('#trace-clear').addEventListener('click',()=>setup(currentText));

  function ptFromEvent(e){
    const r=canvas.getBoundingClientRect();
    const cx = (e.touches? e.touches[0].clientX : e.clientX) - r.left;
    const cy = (e.touches? e.touches[0].clientY : e.clientY) - r.top;
    return {x: cx*(canvas.width/r.width), y: cy*(canvas.height/r.height)};
  }
  function paintAt(p){
    ctx.beginPath();
    if(lastPt){ ctx.moveTo(lastPt.x,lastPt.y); ctx.lineTo(p.x,p.y); }
    else{ ctx.moveTo(p.x,p.y); ctx.lineTo(p.x+0.1,p.y+0.1); }
    ctx.strokeStyle='#FF6FA5'; ctx.lineWidth=10; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.stroke();
    // mark drawn pixels (approx by sampling small square)
    const x0=Math.max(0,Math.floor(p.x-5)), x1=Math.min(canvas.width-1,Math.floor(p.x+5));
    const y0=Math.max(0,Math.floor(p.y-5)), y1=Math.min(canvas.height-1,Math.floor(p.y+5));
    for(let y=y0;y<=y1;y++){ for(let x=x0;x<=x1;x++){
      const idx=y*canvas.width+x;
      if(!drawnPixels[idx]){ drawnPixels[idx]=1; drawnCount++; }
    }}
    lastPt=p;
  }
  function start(e){ e.preventDefault(); drawing=true; lastPt=null; paintAt(ptFromEvent(e)); }
  function move(e){ if(!drawing) return; e.preventDefault(); paintAt(ptFromEvent(e)); }
  function end(){ drawing=false; lastPt=null; }
  canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',move); addEventListener('mouseup',end);
  canvas.addEventListener('touchstart',start,{passive:false}); canvas.addEventListener('touchmove',move,{passive:false}); canvas.addEventListener('touchend',end);

  box.querySelector('#trace-check').addEventListener('click',()=>{
    let maskCount=0, hitCount=0;
    for(let i=0;i<drawnPixels.length;i++){
      const alpha = mask[i*4+3];
      if(alpha>60){ maskCount++; if(drawnPixels[i]) hitCount++; }
    }
    const coverage = maskCount? hitCount/maskCount : 0;
    const accuracy = drawnCount? hitCount/drawnCount : 0;
    const score = Math.round(100*(coverage*0.7 + accuracy*0.3));
    const res=box.querySelector('#trace-result');
    STATE.traceCount++;
    if(score>=60){
      res.innerHTML = `<div class="score-ring">🎉 ${score} / 100</div><p>Hebat sekali! Tulisanmu bagus!</p>`;
      sfxHebat(); launchConfetti();
      awardPoints(8, 'Hebat! Tulisanmu rapi sekali! ✨');
      if(opts.onDone) opts.onDone(score, currentText);
    } else {
      res.innerHTML = `<div class="score-ring">💪 ${score} / 100</div><p>Ayo coba lagi, ikuti garis putus-putus ya!</p>`;
      sfxWrong(); saveState();
    }
  });
}

function renderMemoryGame(box, pairsSource, title, sub){
  const pairs = shuffle(pairsSource).slice(0, Math.min(8, pairsSource.length));
  let cards = [];
  pairs.forEach((p,i)=>{ cards.push({id:i+'a', key:p.key, face:p.a, type:'a'}); cards.push({id:i+'b', key:p.key, face:p.b, type:'b'}); });
  cards = shuffle(cards);
  let flipped=[], matched=[], moves=0;
  box.innerHTML = sectionHead('Permainan', title, sub) +
    `<div class="btn-row" style="margin-bottom:10px;"><span class="chip">Langkah: <span id="mg-moves">0</span></span><span class="chip">Pasangan: <span id="mg-found">0</span>/${pairs.length}</span>
     <button class="btn ghost" id="mg-restart">🔄 Ulangi</button></div>
     <div class="grid cols-4" id="mg-grid"></div>`;
  const grid=box.querySelector('#mg-grid');
  function draw(){
    grid.innerHTML = cards.map(c=>{
      const isUp = flipped.includes(c.id)||matched.includes(c.key)&&matched.includes(c.key);
      const show = flipped.includes(c.id) || matched.includes(c.id);
      return `<button class="tile" data-id="${c.id}" style="min-height:88px;font-size:${c.type==='a'?'1.6rem':'2rem'};">${show? c.face : '❓'}</button>`;
    }).join('');
    grid.querySelectorAll('.tile').forEach(t=>t.addEventListener('click',()=>flip(t.dataset.id)));
  }
  function flip(id){
    if(flipped.includes(id) || matched.includes(id)) return;
    if(flipped.length>=2) return;
    flipped.push(id); draw();
    if(flipped.length===2){
      moves++; box.querySelector('#mg-moves').textContent=moves;
      const c1=cards.find(c=>c.id===flipped[0]), c2=cards.find(c=>c.id===flipped[1]);
      if(c1.key===c2.key && c1.id!==c2.id){
        setTimeout(()=>{ matched.push(c1.id,c2.id); flipped=[]; draw();
          box.querySelector('#mg-found').textContent = matched.length/2;
          sfxCorrect();
          if(matched.length===cards.length){ launchConfetti(); awardPoints(20,'Wow! Semua pasangan ketemu!'); sfxHebat(); }
          else { playTone(660,.12,'sine'); }
        }, 350);
      } else {
        sfxWrong();
        setTimeout(()=>{ flipped=[]; draw(); }, 700);
      }
    }
  }
  box.querySelector('#mg-restart').addEventListener('click',()=> (title.includes('Huruf')?renderMemoriHuruf:renderMemoriGame)(box));
  draw();
}

/* =========================================================================
   13. QUIZ ENGINE (reusable for: baca suku kata, tebak huruf, tebak suara,
       mencocokkan gambar, tebak bayangan)
   ========================================================================= */
function makeQuiz(box, cfg){
  // cfg: {title, eyebrow, pool: [{key,label,display}], promptType:'text'|'emoji'|'speak', choiceType:'text'|'emoji', total, onCorrectPts}
  let idx=0, correct=0, streak=0, total=cfg.total||10, roundItems=shuffle(cfg.pool).slice(0,total);
  box.innerHTML = sectionHead(cfg.eyebrow, cfg.title, cfg.sub||'') +
    `<div class="btn-row"><span class="chip">Soal <span id="q-idx">1</span>/${total}</span><span class="chip">Benar: <span id="q-correct">0</span></span></div>
     <div class="quiz-box">
       <div id="q-prompt" class="quiz-prompt"></div>
       <div id="q-choices" class="quiz-choices"></div>
     </div>`;
  const promptEl=box.querySelector('#q-prompt'), choicesEl=box.querySelector('#q-choices');
  function nextQ(){
    if(idx>=roundItems.length){ finish(); return; }
    box.querySelector('#q-idx').textContent = idx+1;
    const item = roundItems[idx];
    promptEl.innerHTML = cfg.renderPrompt(item);
    if(cfg.autoSpeak) speak(cfg.autoSpeak(item));
    const wrongPool = shuffle(cfg.pool.filter(p=>p.key!==item.key)).slice(0,3);
    const options = shuffle([item, ...wrongPool]);
    choicesEl.innerHTML = options.map(o=>`<button class="btn choice" data-key="${escAttr(o.key)}">${cfg.renderChoice(o)}</button>`).join('');
    choicesEl.querySelectorAll('.choice').forEach(b=>b.addEventListener('click',()=>{
      const ok = b.dataset.key===item.key;
      choicesEl.querySelectorAll('.choice').forEach(x=>x.disabled=true);
      if(ok){
        b.style.outline='3px solid var(--green)'; correct++; streak++;
        STATE.quizStreakNow=streak; STATE.quizStreakBest=Math.max(STATE.quizStreakBest,streak);
        sfxCorrect(); box.querySelector('#q-correct').textContent=correct;
        mascotSay(['Hebat!','Betul sekali!','Kamu pintar!','Mantap!'][randInt(0,3)], false);
      } else {
        b.style.outline='3px solid var(--red)'; streak=0; sfxWrong();
        const rb=choicesEl.querySelector(`[data-key="${CSS.escape(item.key)}"]`); if(rb) rb.style.outline='3px solid var(--green)';
        mascotSay('Belum tepat, coba lagi ya!', false);
      }
      saveState();
      setTimeout(()=>{ idx++; nextQ(); }, 800);
    }));
  }
  function finish(){
    const pct = Math.round(100*correct/roundItems.length);
    box.querySelector('.quiz-box').innerHTML = `
      <div class="score-ring">🎉 ${correct}/${roundItems.length} (${pct}%)</div>
      <p>${pct>=80?'Luar biasa! ⭐⭐':pct>=50?'Bagus, terus berlatih!':'Ayo coba lagi, kamu pasti bisa!'}</p>
      <button class="btn primary big" id="q-again">🔄 Main Lagi</button>`;
    const pts = correct*(cfg.onCorrectPts||3);
    awardPoints(pts, 'Kuis selesai! Kamu dapat '+pts+' poin!');
    if(pct>=80) launchConfetti();
    box.querySelector('#q-again').addEventListener('click',()=>makeQuiz(box,cfg));
  }
  nextQ();
}

   ========================================================================= */
function renderSusunKata(box){
  const words = shuffle(ALL_WORDS.map(w=>w[0])).slice(0,10);
  let idx=0, correctCount=0;
  box.innerHTML = sectionHead('Literasi','Susun Huruf Menjadi Kata','Tekan huruf sesuai urutan untuk membentuk kata.') +
    `<div class="btn-row"><span class="chip">Kata <span id="sk-idx">1</span>/${words.length}</span><span class="chip">Benar: <span id="sk-correct">0</span></span></div>
     <div class="quiz-box">
       <div id="sk-emo" style="font-size:3.6rem;"></div>
       <div id="sk-target" style="font-size:2.2rem;font-weight:900;letter-spacing:6px;min-height:56px;color:var(--purple-dark);margin:10px 0;"></div>
       <div id="sk-letters" class="btn-row" style="justify-content:center;"></div>
       <div class="btn-row" style="justify-content:center;"><button class="btn ghost" id="sk-reset">🧹 Ulang</button><button class="btn teal" id="sk-hear">🔊 Dengarkan</button></div>
       <div id="sk-result" style="margin-top:12px;"></div>
     </div>`;
  let word, letters, answer;
  function setup(){
    word = words[idx].toUpperCase().replace(/[^A-Z]/g,'');
    const emo = ALL_WORDS.find(w=>w[0].toUpperCase()===words[idx].toUpperCase())[1];
    box.querySelector('#sk-emo').textContent=emo;
    box.querySelector('#sk-idx').textContent=idx+1;
    box.querySelector('#sk-target').textContent = '_ '.repeat(word.length).trim();
    answer=[];
    letters = shuffle(word.split(''));
    drawLetters();
  }
  function drawLetters(){
    box.querySelector('#sk-letters').innerHTML = letters.map((c,i)=>`<button class="btn primary" data-i="${i}" style="font-size:1.3rem;min-width:44px;">${c}</button>`).join('');
    box.querySelector('#sk-letters').querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
      answer.push(letters[b.dataset.i]);
      letters.splice(b.dataset.i,1);
      box.querySelector('#sk-target').textContent = answer.join(' ') + (answer.length<word.length? ' _'.repeat(word.length-answer.length):'');
      drawLetters();
      sfxClick();
      if(answer.join('')===word){
        correctCount++; box.querySelector('#sk-correct').textContent=correctCount;
        markMastered('wordsMastered', words[idx]);
        sfxCorrect(); launchConfetti();
        box.querySelector('#sk-result').innerHTML=`<p style="color:var(--green);font-weight:800;">🎉 Benar! Kata: ${word}</p>`;
        awardPoints(8);
        setTimeout(()=>{ idx++; if(idx<words.length){ box.querySelector('#sk-result').innerHTML=''; setup(); } else finish(); }, 1100);
      } else if(answer.length===word.length){
        sfxWrong();
        box.querySelector('#sk-result').innerHTML=`<p style="color:var(--red);font-weight:800;">Coba lagi ya!</p>`;
        setTimeout(()=>{ letters=shuffle(word.split('')); answer=[]; box.querySelector('#sk-target').textContent='_ '.repeat(word.length).trim(); drawLetters(); box.querySelector('#sk-result').innerHTML=''; }, 900);
      }
    }));
  }
  function finish(){
    box.querySelector('.quiz-box').innerHTML = `<div class="score-ring">🎉 ${correctCount}/${words.length}</div><p>Kamu hebat menyusun kata!</p><button class="btn primary big" id="sk-again">🔄 Main Lagi</button>`;
    box.querySelector('#sk-again').addEventListener('click',()=>renderSusunKata(box));
  }
  box.querySelector('#sk-reset').addEventListener('click',setup);
  box.querySelector('#sk-hear').addEventListener('click',()=>speak(word));
  setup();
}

function renderTangkapHuruf(box){
  box.innerHTML = sectionHead('Permainan','Tangkap Huruf','Tekan huruf yang sesuai target sebelum jatuh ke bawah!') +
    `<div class="btn-row"><span class="chip">Target: <span id="th-target" style="font-size:1.3rem;">-</span></span><span class="chip">Skor: <span id="th-score">0</span></span><span class="chip">Nyawa: <span id="th-life">❤️❤️❤️</span></span>
     <button class="btn primary" id="th-start">▶️ Mulai</button></div>
     <div class="game-canvas-wrap"><canvas id="th-canvas" class="game-canvas" width="640" height="420"></canvas></div>`;
  const canvas=box.querySelector('#th-canvas'); const ctx=canvas.getContext('2d');
  let items=[], score=0, life=3, target=null, running=false, spawnTimer=0, raf=null;
  function newTarget(){ target = ALPHABET[randInt(0,25)].l; box.querySelector('#th-target').textContent=target; speak(target); }
  function spawn(){
    const letter = Math.random()<0.4 ? target : ALPHABET[randInt(0,25)].l;
    items.push({x:randInt(30,610), y:-20, l:letter, speed:1+Math.random()*1.4});
  }
  function loop(){
    if(!running) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    spawnTimer++;
    if(spawnTimer>55){ spawn(); spawnTimer=0; }
    items.forEach(it=>{ it.y+=it.speed; });
    items = items.filter(it=>{
      if(it.y>canvas.height){ if(it.l===target){ life--; updateLife(); } return false; }
      return true;
    });
    items.forEach(it=>{
      ctx.font='34px "Segoe UI Rounded", Verdana, sans-serif'; ctx.textAlign='center';
      ctx.fillStyle = it.l===target? '#7C5CFC':'#B9AEE8';
      ctx.beginPath(); ctx.arc(it.x,it.y,22,0,7); ctx.fillStyle='#fff'; ctx.fill();
      ctx.strokeStyle = it.l===target? '#7C5CFC':'#cfc7f5'; ctx.lineWidth=3; ctx.stroke();
      ctx.fillStyle = it.l===target? '#7C5CFC':'#8b83b8';
      ctx.fillText(it.l, it.x, it.y+11);
    });
    if(life<=0){ endGame(); return; }
    raf=requestAnimationFrame(loop);
  }
  function updateLife(){ box.querySelector('#th-life').textContent='❤️'.repeat(Math.max(0,life)); }
  function click(e){
    if(!running) return;
    const r=canvas.getBoundingClientRect();
    const x=(e.clientX-r.left)*(canvas.width/r.width), y=(e.clientY-r.top)*(canvas.height/r.height);
    for(let i=items.length-1;i>=0;i--){
      const it=items[i]; const d=Math.hypot(it.x-x, it.y-y);
      if(d<26){
        if(it.l===target){ score+=10; sfxCorrect(); newTarget(); }
        else { sfxWrong(); life--; updateLife(); }
        items.splice(i,1);
        box.querySelector('#th-score').textContent=score;
        break;
      }
    }
  }
  function endGame(){
    running=false; cancelAnimationFrame(raf);
    ctx.fillStyle='rgba(255,255,255,.9)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#7C5CFC'; ctx.font='30px sans-serif'; ctx.textAlign='center';
    ctx.fillText('Permainan Selesai! Skor: '+score, canvas.width/2, canvas.height/2);
    awardPoints(Math.round(score/2),'Seru sekali! Kamu dapat '+Math.round(score/2)+' poin!');
    if(score>=100) launchConfetti();
  }
  canvas.addEventListener('click', click);
  box.querySelector('#th-start').addEventListener('click',()=>{
    items=[]; score=0; life=3; updateLife(); box.querySelector('#th-score').textContent=0;
    newTarget(); running=true; loop();
  });
}

function renderCepatHitung(box){
  box.innerHTML = sectionHead('Permainan','Cepat Hitung','Jawab sebanyak mungkin soal sebelum waktu habis!') +
    `<div class="btn-row"><span class="chip">⏱️ Waktu: <span id="ch-time">30</span> dtk</span><span class="chip">Skor: <span id="ch-score">0</span></span>
     <button class="btn primary" id="ch-start">▶️ Mulai</button></div>
     <div class="quiz-box"><div id="ch-prompt" class="quiz-prompt">Tekan mulai!</div><div id="ch-choices" class="quiz-choices"></div></div>`;
  let score=0, timeLeft=30, timer=null, answer=0;
  function question(){
    const a=randInt(1,10), b=randInt(1,10); const isAdd=Math.random()<0.5;
    answer = isAdd? a+b : Math.max(a,b)-Math.min(a,b);
    box.querySelector('#ch-prompt').textContent = isAdd? `${a} + ${b} = ?` : `${Math.max(a,b)} - ${Math.min(a,b)} = ?`;
    const opts=shuffle([answer, answer+1, Math.max(0,answer-1), answer+2].filter((v,i,arr)=>arr.indexOf(v)===i)).slice(0,4);
    if(!opts.includes(answer)) opts[0]=answer;
    box.querySelector('#ch-choices').innerHTML = shuffle(opts).map(o=>`<button class="btn choice" data-v="${o}">${o}</button>`).join('');
    box.querySelector('#ch-choices').querySelectorAll('.choice').forEach(b=>b.addEventListener('click',()=>{
      if(+b.dataset.v===answer){ score++; sfxCorrect(); STATE.mathCorrect++; } else sfxWrong();
      box.querySelector('#ch-score').textContent=score; saveState();
      question();
    }));
  }
  box.querySelector('#ch-start').addEventListener('click',()=>{
    score=0; timeLeft=30; box.querySelector('#ch-score').textContent=0; box.querySelector('#ch-time').textContent=timeLeft;
    question();
    clearInterval(timer);
    timer=setInterval(()=>{
      timeLeft--; box.querySelector('#ch-time').textContent=timeLeft;

        clearInterval(timer);
        box.querySelector('#ch-choices').innerHTML='';

        awardPoints(score*3,'Cepat sekali menghitungnya!');
        if(score>=8) launchConfetti();
      }
    },1000);
  });
}

function renderRoda(box){

  ];
  const colors=['#7C5CFC','#FF6FA5','#12B6A8','#FFC93C','#3FC97A','#4EA8FF','#FF9F5C','#B389FF'];
  const n=prizes.length, seg=360/n;
  box.innerHTML = sectionHead('Permainan','Roda Keberuntungan','Putar roda dan dapatkan poin bonus!') +
    `<div class="wheel-wrap">
      <div style="position:relative;">
        <svg id="wheel-svg" width="300" height="300" viewBox="0 0 300 300">
          ${prizes.map((p,i)=>{
            const a0=(i*seg-90)*Math.PI/180, a1=((i+1)*seg-90)*Math.PI/180;
            const x0=150+140*Math.cos(a0), y0=150+140*Math.sin(a0);
            const x1=150+140*Math.cos(a1), y1=150+140*Math.sin(a1);
            const mid=(a0+a1)/2, tx=150+95*Math.cos(mid), ty=150+95*Math.sin(mid);
            return `<path d="M150,150 L${x0},${y0} A140,140 0 0,1 ${x1},${y1} Z" fill="${colors[i]}" stroke="#fff" stroke-width="2"/>
              <text x="${tx}" y="${ty}" fill="#fff" font-size="12" font-weight="800" text-anchor="middle" transform="rotate(${(i*seg+seg/2)}, ${tx}, ${ty})">${p.label}</text>`;
          }).join('')}
          <circle cx="150" cy="150" r="18" fill="#fff" stroke="#7C5CFC" stroke-width="4"/>
        </svg>
        <div style="position:absolute; top:-6px; left:50%; transform:translateX(-50%); font-size:1.6rem;">🔻</div>
      </div>
      <button class="btn primary big" id="wheel-spin">🎡 Putar!</button>
      <div id="wheel-result" style="font-weight:800; font-size:1.2rem;"></div>
     </div>`;
  const svg=box.querySelector('#wheel-svg');
  let spinning=false, rot=0;
  box.querySelector('#wheel-spin').addEventListener('click',()=>{
    if(spinning) return; spinning=true;
    const idx = randInt(0,n-1);
    const target = 360*5 + (360 - (idx*seg+seg/2));
    rot = target;
    svg.style.transform = `rotate(${rot}deg)`;
    sfxClick();
    setTimeout(()=>{
      const p=prizes[idx];
      box.querySelector('#wheel-result').textContent = p.pts>0? `🎉 Kamu dapat ${p.label}!` : 'Yah, coba lagi lain kali!';
      if(p.pts>0){ awardPoints(p.pts); launchConfetti(); sfxHebat(); } else sfxWrong();
      spinning=false;
    },3600);
  });
}

function drawRaporChart(canvas){
  const ctx=canvas.getContext('2d');
  const days=[]; for(let i=6;i>=0;i--){ const d=new Date(Date.now()-i*86400000); days.push(d.toISOString().slice(0,10)); }
  const vals = days.map(d=>{ const h=STATE.history.find(x=>x.date===d); return h?h.points:0; });
  const max=Math.max(10,...vals);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const bw=canvas.width/days.length;
  vals.forEach((v,i)=>{
    const h=(v/max)*(canvas.height-40);
    ctx.fillStyle='#7C5CFC';
    ctx.fillRect(i*bw+bw*0.2, canvas.height-30-h, bw*0.6, h);
    ctx.fillStyle='#5B5480'; ctx.font='11px sans-serif'; ctx.textAlign='center';
    ctx.fillText(days[i].slice(5), i*bw+bw/2, canvas.height-12);
    ctx.fillText(v, i*bw+bw/2, canvas.height-34-h);
  });
}

    const reader=new FileReader();
    reader.onload=()=>{ try{ const data=JSON.parse(reader.result); STATE=Object.assign(defaultState(),data); saveState(); applyAll(); toast('Progres berhasil diimpor!'); renderTopbar(); }catch(err){ toast('File tidak valid.'); } };
    reader.readAsText(file);
  });
  box.querySelector('#set-reset').addEventListener('click',()=>{
    if(confirm('Yakin ingin menghapus semua progres belajar?')){
      STATE=defaultState(); saveState(); applyAll(); toast('Progres telah direset.'); renderTopbar(); goTo('home');
    }
  });
}
function applyTheme(){ document.documentElement.setAttribute('data-theme', STATE.settings.theme); }
function applyFontSize(){ document.documentElement.style.setProperty('--font-scale', STATE.settings.fontSize); }
function applyDyslexia(){ document.documentElement.setAttribute('data-dyslexia', STATE.settings.dyslexia?'1':'0'); }
function applyAll(){ applyTheme(); applyFontSize(); applyDyslexia(); }

/* =========================================================================
   29. TOPBAR + INIT
   ========================================================================= */
function renderTopbar(){
  document.getElementById('stat-points').textContent = STATE.points;
  document.getElementById('stat-level').textContent = currentLevel().name;
  document.getElementById('stat-streak').textContent = STATE.streak+' hari';
}
document.getElementById('hamburger').addEventListener('click',()=>document.getElementById('sidebar').classList.toggle('open'));
document.getElementById('mute-btn').addEventListener('click',(e)=>{
  STATE.settings.sfx=!STATE.settings.sfx; saveState();
  e.target.textContent = STATE.settings.sfx? '🔊':'🔇';
});
document.getElementById('theme-btn').addEventListener('click',()=>{
  STATE.settings.theme = STATE.settings.theme==='dark'?'light':'dark';
  applyTheme(); saveState();
});

function init(){
  applyAll();
  buildNav();
  renderTopbar();
  touchStreak();
  goTo('home');
  setTimeout(()=>mascotSay('Halo! Aku Kaka si burung hantu. Ayo kita belajar hari ini! 🦉', true), 900);
}
