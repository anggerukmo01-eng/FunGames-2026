        // Fungsi Load Data dari Google Sheets
        async function loadData() {
            if (!SCRIPT_URL) {
                renderTable(); // Pakai data lokal jika URL belum ada
                return;
            }
            try {
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '<tr><td colspan="15" class="text-center py-6 text-gray-500">Mengambil data dari Spreadsheet...</td></tr>';
                const response = await fetch(SCRIPT_URL);
                const result = await response.json();
                if(result.status === 'success' && result.data.length > 0) {
                    students = result.data;
                }
                renderTable();
            } catch(e) {
                console.error(e);
                renderTable(); // Fallback ke lokal jika gagal koneksi
            }
        }

        // Fungsi untuk me-render tabel
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; 

            students.forEach((student, index) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50 transition-colors";
                
                tr.innerHTML = `
                    <td class="px-4 py-3 text-center border-r text-gray-500">${index + 1}</td>
                    <td class="px-4 py-3 text-center border-r">
                        <button onclick="openModal(${index})" class="text-blue-600 hover:text-blue-800 bg-blue-100 hover:bg-blue-200 p-1.5 rounded" title="Edit Data">
                            <i data-lucide="edit" class="w-4 h-4"></i>
                        </button>
                    </td>
                    <td class="px-4 py-3 border-r font-medium text-gray-900">${student.nis}</td>
                    <td class="px-4 py-3 border-r">${student.nisn}</td>
                    <td class="px-4 py-3 border-r font-semibold">${student.nama}</td>
                    <td class="px-4 py-3 border-r">${student.panggilan || '-'}</td>
                    <td class="px-4 py-3 border-r">${student.ttl}</td>
                    <td class="px-4 py-3 border-r">${student.jk}</td>
                    <td class="px-4 py-3 border-r">${student.agama}</td>
                    <td class="px-4 py-3 border-r text-gray-600">${student.pendidikan || '-'}</td>
                    <td class="px-4 py-3 border-r">${student.alamat}</td>
                    <td class="px-4 py-3 border-r">${student.ayah_nama || '-'}</td>
                    <td class="px-4 py-3 border-r">${student.ibu_nama || '-'}</td>
                    <td class="px-4 py-3 border-r text-gray-600">${student.ayah_pekerjaan || '-'}</td>
                    <td class="px-4 py-3 text-gray-600">${student.ibu_pekerjaan || '-'}</td>
                `;
                tbody.appendChild(tr);
            });
            
            if(window.lucide) lucide.createIcons();
        }

        function openModal(index = -1) {
            const modal = document.getElementById('formModal');
            const form = document.getElementById('studentForm');
            const title = document.getElementById('modalTitle');
            
            form.reset();

            if (index > -1) {
                title.innerText = "Edit Data Siswa";
                const student = students[index];
                document.getElementById('dataIndex').value = index;
                
                document.getElementById('input_nis').value = student.nis;
                document.getElementById('input_nisn').value = student.nisn;
                document.getElementById('input_nama').value = student.nama;
                document.getElementById('input_panggilan').value = student.panggilan;
                document.getElementById('input_ttl').value = student.ttl;
                document.getElementById('input_jk').value = student.jk;
                document.getElementById('input_agama').value = student.agama;
                document.getElementById('input_pendidikan').value = student.pendidikan;
                document.getElementById('input_alamat').value = student.alamat;
                document.getElementById('input_ayah_nama').value = student.ayah_nama;
                document.getElementById('input_ayah_pekerjaan').value = student.ayah_pekerjaan;
                document.getElementById('input_ibu_nama').value = student.ibu_nama;
                document.getElementById('input_ibu_pekerjaan').value = student.ibu_pekerjaan;
            } else {
                title.innerText = "Tambah Data Siswa Baru";
                document.getElementById('dataIndex').value = -1;
                document.getElementById('input_agama').value = "Islam";
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() {
            const modal = document.getElementById('formModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        async function saveData(event) {
            event.preventDefault(); 
            const index = parseInt(document.getElementById('dataIndex').value);
            const btnSimpan = document.getElementById('btnSimpan');
            
            const newData = {
                nis: document.getElementById('input_nis').value,
                nisn: document.getElementById('input_nisn').value,
                nama: document.getElementById('input_nama').value,
                panggilan: document.getElementById('input_panggilan').value,
                ttl: document.getElementById('input_ttl').value,
                jk: document.getElementById('input_jk').value,
                agama: document.getElementById('input_agama').value,
                pendidikan: document.getElementById('input_pendidikan').value,
                alamat: document.getElementById('input_alamat').value,
                ayah_nama: document.getElementById('input_ayah_nama').value,
                ayah_pekerjaan: document.getElementById('input_ayah_pekerjaan').value,
                ibu_nama: document.getElementById('input_ibu_nama').value,
                ibu_pekerjaan: document.getElementById('input_ibu_pekerjaan').value,
            };

            const actionType = index > -1 ? 'update' : 'add';

            if (!SCRIPT_URL) {
                // Mode Lokal (Belum ada URL Spreadsheet)
                if (index > -1) students[index] = newData;
                else students.push(newData);
                finishSave(btnSimpan);
                return;
            }

            // Mode Cloud: Simpan ke Google Sheets via API
            btnSimpan.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 mr-2 animate-spin"></i> Menyimpan...';
            btnSimpan.disabled = true;
            if(window.lucide) lucide.createIcons();

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: actionType, data: newData })
                });
                
                const result = await response.json();
                
                if(result.status === 'success') {
                    if (index > -1) students[index] = newData;
                    else students.push(newData);
                    finishSave(btnSimpan);
                } else {
                    throw new Error("Gagal dari server");
                }
            } catch (error) {
                console.error(error);
                alert('Gagal menyimpan ke Spreadsheet. Pastikan URL Apps Script benar.');
                btnSimpan.innerHTML = 'Simpan Data';
                btnSimpan.disabled = false;
            }
        }

        function finishSave(btnSimpan) {
            closeModal();
            renderTable();
            
            const originalText = 'Simpan Data';
            btnSimpan.innerHTML = originalText;
            btnSimpan.disabled = false;

            const btnTambah = document.querySelector('button[onclick="openModal()"]');
            const originalTambah = btnTambah.innerHTML;
            
            btnTambah.innerHTML = '<i data-lucide="check" class="w-4 h-4 mr-2"></i> Tersimpan!';
            btnTambah.classList.add('bg-green-600');
            if(window.lucide) lucide.createIcons();
            
            setTimeout(() => {
                btnTambah.innerHTML = originalTambah;
                btnTambah.classList.remove('bg-green-600');
                if(window.lucide) lucide.createIcons();
            }, 2000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });
    </script>
</body>
</html>
